<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청년부 주일예배 안내</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Pretendard 한글 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: {
              50:  '#F3F6F1',
              100: '#E4EBDF',
              200: '#C9D8C0',
              300: '#A9BF9D',
              400: '#8FAB81',
              500: '#7C9A72',
              600: '#62805A',
              700: '#4D6647',
              800: '#3C5038',
              900: '#2E3D2B',
            },
            cream: '#FAF7EF',
            apricot: {
              100: '#FBEBD9',
              300: '#F6CFA4',
              400: '#F2B880',
              500: '#E89C58',
              600: '#D17F3A',
            },
          },
          fontFamily: {
            sans: ['"Pretendard Variable"', 'Pretendard', '-apple-system', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    /* ── 리퀴드 글래스 공통 ─────────────────────────── */
    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow:
        0 8px 32px rgba(60, 80, 56, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }
    .glass-deep {
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* ── 배경 그라디언트 블롭 ─────────────────────────── */
    .page-bg {
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%,   rgba(169, 191, 157, 0.45), transparent 70%),
        radial-gradient(ellipse 70% 45% at 90% 25%,  rgba(242, 184, 128, 0.28), transparent 70%),
        radial-gradient(ellipse 90% 60% at 50% 100%, rgba(124, 154, 114, 0.35), transparent 75%),
        #FAF7EF;
    }

    /* ── 모바일 특화 단일 컬럼 (웹: 자연 높이로 세로 스크롤) ── */
    .page {
      width: 100%;
      max-width: 430px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 2.5rem;
      overflow: hidden;
    }

    /* 도움말 패널 토글 애니메이션 */
    .help-panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.3s ease;
    }
    .help-panel.open { grid-template-rows: 1fr; }
    .help-panel > div { overflow: hidden; }

    /* ── PDF(인쇄) 스타일 ─────────────────────────── */
    @page {
      size: 105mm 227mm; /* 390:844 비율 */
      margin: 0;
    }
    @media print {
      body { background: none !important; }
      .no-print { display: none !important; }
      .print-layout { display: block !important; padding: 0 !important; gap: 0 !important; }
      .page {
        width: 105mm;
        max-width: none;
        min-height: 227mm;
        margin: 0;
        border-radius: 0;
        box-shadow: none !important;
        page-break-after: always;
        break-after: page;
      }
      .page:last-of-type {
        page-break-after: auto;
        break-after: auto;
      }
      .glass, .glass-deep {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background: rgba(255, 255, 255, 0.72);
      }
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  </style>
</head>

<body class="bg-sage-100 font-sans text-sage-900 antialiased">

  <!-- 상단 툴바 (웹 전용) -->
  <header class="no-print sticky top-0 z-50 flex items-center justify-between px-6 py-3 glass">
    <div class="flex items-center gap-2">
      <!-- heroicon: sparkles -->
      <svg class="w-5 h-5 text-sage-600" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z" />
      </svg>
      <span class="font-semibold text-sage-800">청년부 주일예배 안내</span>
    </div>
    <button onclick="window.print()"
      class="flex items-center gap-1.5 rounded-full bg-sage-600 px-4 py-2 text-sm font-medium text-white shadow-md transition hover:bg-sage-700 active:scale-95">
      <!-- heroicon: arrow-down-tray -->
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
      </svg>
      PDF로 저장
    </button>
  </header>

  <!-- 페이지 컨테이너: 웹은 단일 세로 스크롤, PDF는 섹션별 1장 -->
  <main class="print-layout flex flex-col items-center gap-4 px-4 py-8">

    <!-- ════════════════════════════════════════════
         PAGE 1 · 예배 안내 (환영 / 시간 / 마음가짐)
         ════════════════════════════════════════════ -->
    <div class="no-print w-full max-w-[430px] px-2 text-[11px] font-semibold tracking-wider text-sage-500">PDF · 1페이지</div>
    <section class="page page-bg relative shadow-2xl">
      <div class="flex h-full min-h-[inherit] flex-col px-7 py-10">

        <!-- 상단 라벨 -->
        <div class="glass mx-auto rounded-full px-5 py-1.5 text-xs font-semibold tracking-widest text-sage-700">
          SUNGKWANG YOUTH
        </div>

        <!-- 타이틀 -->
        <div class="mt-10 text-center">
          <p class="text-sm font-medium text-sage-600">함께 드리는</p>
          <h1 class="mt-1 text-4xl font-bold tracking-tight text-sage-900">청년부<br/>주일예배</h1>
          <p class="mt-4 text-sm leading-relaxed text-sage-700">
            처음 오신 분도, 오랜만에 오신 분도<br/>
            언제나 환영합니다 🌿
          </p>
        </div>

        <!-- 예배 시간 카드 -->
        <div class="glass mt-10 rounded-[2rem] p-6">
          <div class="flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-sage-400/90 text-white shadow-md">
              <!-- heroicon: heart -->
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
              </svg>
            </div>
            <div>
              <p class="text-xs font-medium text-sage-600">예배를 준비하는 마음 <span class="text-sage-500">· 함께 기도</span></p>
              <p class="text-lg font-bold text-sage-900">주일 오후 1시 20분</p>
            </div>
          </div>
          <div class="mt-4 flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-sage-500/90 text-white shadow-md">
              <!-- heroicon: clock -->
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
              </svg>
            </div>
            <div>
              <p class="text-xs font-medium text-sage-600">주일예배 시작</p>
              <p class="text-lg font-bold text-sage-900">주일 오후 1시 30분</p>
            </div>
          </div>
          <div class="mt-4 flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-apricot-400/90 text-white shadow-md">
              <!-- heroicon: map-pin -->
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
              </svg>
            </div>
            <div>
              <p class="text-xs font-medium text-sage-600">예배 장소</p>
              <p class="text-lg font-bold text-sage-900">청년부 예배실</p>
            </div>
          </div>
        </div>

        <!-- 예배 흐름 한눈에 -->
        <div class="glass-deep mt-6 rounded-[2rem] p-6">
          <p class="text-xs font-semibold tracking-wider text-sage-600">예배의 흐름</p>
          <div class="mt-3 flex items-center justify-between text-center text-[11px] font-medium text-sage-800">
            <div class="flex flex-col items-center gap-1.5">
              <span class="flex h-9 w-9 items-center justify-center rounded-full bg-white/70 shadow-sm">🙏</span>
              나아감
            </div>
            <span class="text-sage-400">─</span>
            <div class="flex flex-col items-center gap-1.5">
              <span class="flex h-9 w-9 items-center justify-center rounded-full bg-white/70 shadow-sm">🎵</span>
              찬양
            </div>
            <span class="text-sage-400">─</span>
            <div class="flex flex-col items-center gap-1.5">
              <span class="flex h-9 w-9 items-center justify-center rounded-full bg-white/70 shadow-sm">📖</span>
              말씀
            </div>
            <span class="text-sage-400">─</span>
            <div class="flex flex-col items-center gap-1.5">
              <span class="flex h-9 w-9 items-center justify-center rounded-full bg-white/70 shadow-sm">💚</span>
              응답
            </div>
          </div>
        </div>

        <!-- 하단 문구 -->
        <p class="mt-auto pt-8 text-center text-xs leading-relaxed text-sage-600">
          기도로 예배를 준비하는<br/>모두가 되길 원합니다.
        </p>
      </div>
    </section>

    <!-- ════════════════════════════════════════════
         PAGE 2 · 예배 순서
         ════════════════════════════════════════════ -->
    <div class="no-print mt-4 w-full max-w-[430px] px-2 text-[11px] font-semibold tracking-wider text-sage-500">PDF · 2페이지</div>
    <section class="page page-bg relative shadow-2xl">
      <div class="flex h-full min-h-[inherit] flex-col px-7 py-10">

        <!-- 타이틀 -->
        <div class="text-center">
          <div class="glass mx-auto inline-block rounded-full px-6 py-2">
            <h2 class="text-lg font-bold tracking-widest text-sage-800">예배 순서</h2>
          </div>
          <p class="mt-3 text-xs text-sage-600">
            궁금한 순서는 <span class="inline-flex h-4 w-4 items-center justify-center rounded-full bg-sage-500 align-middle text-[10px] font-bold text-white">?</span> 버튼을 눌러보세요
          </p>
        </div>

        <!-- 순서 리스트 -->
        <ol class="mt-7 flex flex-col gap-3" id="order-list">
          <!-- JS로 렌더링 -->
        </ol>

        <p class="mt-auto pt-6 text-center text-[11px] text-sage-600">
          예배 후에는 광고와 교제의 시간이 이어집니다 ☕
        </p>
      </div>
    </section>
  </main>

  <script>
    // ── 예배 순서 데이터 (매주 동일한 일반 명칭만) ──────────
    const ORDER = [
      {
        name: '예배를 준비하는 마음',
        sub: '오후 1시 20분 · 함께 기도',
        emoji: '🌱',
        pre: true,
        help: '예배가 시작되기 전, 미리 모여 함께 기도하며 마음을 준비하는 시간이에요. 조금 일찍 와서 조용히 자리에 앉아 기도로 동참하시면 됩니다.',
      },
      {
        name: '사도신경',
        sub: '다같이',
        emoji: '🙏',
        help: '기독교 신앙의 핵심을 요약한 고백문이에요. 모두 함께 소리 내어 암송하며 우리가 믿는 바를 고백합니다. 화면(또는 주보)에 전문이 나오니 처음이어도 따라 읽으시면 됩니다.',
      },
      {
        name: '찬양',
        sub: '찬양팀',
        emoji: '🎵',
        help: '노래로 하나님께 마음을 표현하는 시간이에요. 찬양팀의 인도에 따라 함께 부릅니다. 가사는 화면에 나오고, 자리에서 일어나 자유롭게 참여하시면 됩니다.',
      },
      {
        name: '대표기도',
        sub: '청년 중 한 명',
        emoji: '🕊️',
        help: '한 사람이 모두를 대표해서 소리 내어 기도하는 순서예요. 나머지는 눈을 감고 마음속으로 함께 기도하다가, 끝나면 다같이 "아멘"으로 화답합니다.',
      },
      {
        name: '성경봉독',
        sub: '오늘의 본문',
        emoji: '📖',
        help: '오늘 설교의 바탕이 되는 성경 구절을 함께 읽는 시간이에요. 화면에 본문이 표시되니 성경이 없어도 괜찮습니다.',
      },
      {
        name: '설교',
        sub: '목사님',
        emoji: '💬',
        help: '목사님이 성경 말씀의 의미를 풀어 전해주시는 시간이에요. 편안히 앉아 들으시면 되고, 우리의 삶에 어떻게 적용할지 함께 생각해봅니다.',
      },
      {
        name: '적용송',
        sub: '다같이',
        emoji: '💚',
        help: '들은 말씀을 마음에 새기며 응답으로 부르는 찬양이에요. 설교의 메시지를 노래로 한 번 더 고백하는 시간입니다.',
      },
      {
        name: '축도',
        sub: '목사님',
        emoji: '✨',
        help: '예배의 마지막 순서로, 목사님이 모두에게 하나님의 복을 빌어주시는 기도예요. 함께 눈을 감고 받은 뒤 "아멘"으로 마칩니다.',
      },
    ];

    const list = document.getElementById('order-list');

    ORDER.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'glass rounded-3xl px-5 py-4';
      li.innerHTML = `
        <div class="flex items-center gap-4">
          <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl bg-white/70 text-lg shadow-sm">${item.emoji}</span>
          <div class="min-w-0 flex-1">
            <p class="font-bold text-sage-900">${item.name}</p>
            <p class="text-xs text-sage-600">${item.sub}</p>
          </div>
          <button type="button" aria-expanded="false" aria-label="${item.name} 설명 보기"
            onclick="toggleHelp(this, ${i})"
            class="no-print flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-sage-500 text-white shadow-md transition hover:bg-sage-600 active:scale-90">
            <!-- heroicon: question-mark-circle (mini) -->
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
            </svg>
          </button>
        </div>
        <div class="help-panel" id="help-${i}">
          <div>
            <p class="mt-3 rounded-2xl bg-white/60 px-4 py-3 text-xs leading-relaxed text-sage-800">
              ${item.help}
            </p>
          </div>
        </div>
      `;
      list.appendChild(li);

      if (item.pre) {
        const divider = document.createElement('li');
        divider.className = 'flex items-center gap-3 px-2 py-0.5';
        divider.innerHTML = `
          <span class="h-px flex-1 bg-sage-300/70"></span>
          <span class="text-[11px] font-semibold tracking-wider text-sage-600">오후 1시 30분 · 예배 시작</span>
          <span class="h-px flex-1 bg-sage-300/70"></span>
        `;
        list.appendChild(divider);
      }
    });

    function toggleHelp(btn, i) {
      const panel = document.getElementById(`help-${i}`);
      const open = panel.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
      btn.classList.toggle('bg-apricot-500', open);
      btn.classList.toggle('bg-sage-500', !open);
    }
  </script>
</body>
</html>
